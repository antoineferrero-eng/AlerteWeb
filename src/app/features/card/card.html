
<div class="card-container" *ngIf="bulletin()">
  <h1 class="card-title">{{ departementName() }}</h1>
  
  <div class="card-content">
    <div class="section-today" [ngClass]="getAlertClass()">
      <div class="top-row">
        <div class="title-temp">
          <span class="day-label">Aujourd’hui</span>
          <span class="temp-val" *ngIf="meteoToday()">{{ meteoToday()?.tempMax | number:'1.0-0' }}°C</span>
          <span class="temp-val" *ngIf="!meteoToday()">--°C</span>
        </div>
        <div class="alert-number">{{ maxAlertLevel() }}</div>
      </div>
      <div class="details-bottom">
        <p>{{ alertSummaryToday() }}</p>
      </div>
    </div>

    <div class="section-tomorrow" [ngClass]="getAlertClassTomorrow()">
      <div class="top-row">
        <div class="title-temp">
          <span class="day-label">Demain</span>
          <span class="temp-val" *ngIf="meteoTomorrow()">{{ meteoTomorrow()?.tempMax | number:'1.0-0' }}°C</span>
          <span class="temp-val" *ngIf="!meteoTomorrow()">--°C</span>
        </div>
        <div class="alert-number">{{ maxAlertLevelTomorrow() }}</div>
      </div>
      <div class="details-bottom">
        <p>{{ alertSummaryTomorrow() }}</p>
      </div>
    </div>
  </div>
</div>
